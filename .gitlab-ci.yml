image: azul/zulu-openjdk-debian:25

variables:
  DOCKER_HOST: "tcp://docker:2375"
  # Improve performance by using overlayfs
  DOCKER_DRIVER: overlay2
  # Disable Gradle daemon during build
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_FORCE_HTTPS: true
  GIT_SUBMODULE_DEPTH: 1

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

include:
  - component: $CI_SERVER_FQDN/TIBHannover/gitlab-ci-components/pipeline-trigger-orkg@0.0.7
    inputs:
      stage: deploy
      component_name: orkg-rest-api
      needs:
        - job: docker_build
          optional: true
        - job: docker_build_master
          optional: true
        - job: secret_detection
        - job: container_scanning
  # (Security) Scanning components
  - component: gitlab.com/components/container-scanning/container-scanning@5.2.0
    inputs:
      stage: verify
      cs_image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
      enable_mr_pipelines: false
  - component: gitlab.com/components/secret-detection/secret-detection@2.3.0
    inputs:
      stage: verify
      enable_mr_pipelines: false
  - component: $CI_SERVER_FQDN/components/dependency-scanning/main@2.0.0
    inputs:
      stage: verify
      job_name: dependency_scanning
      # Dependency resolution is done during custom resolve_dependencies job, disable dependency resolution jobs provided by component
      disabled_resolution_jobs: maven,gradle,python

stages:
  - build
  - package
  - verify
  - deploy

default:
  cache:
    # Dedicated cache the Gradle wrapper
    - &gradle_wrapper_cache
      key:
        files:
          - gradle/wrapper/gradle-wrapper.properties
        prefix: gradle-wrapper
      paths:
        - .gradle-user-home/wrapper/
    # Regular Gradle cache, for all things Gradle needs. Uses the cache from the default branch if none was found.
    - &gradle_cache
      key: gradle-$CI_COMMIT_REF_SLUG
      fallback_keys:
        - gradle-$CI_DEFAULT_BRANCH
      paths:
        - .gradle-user-home/caches/
        # Prevent the welcome message to be shown every time
        - .gradle-user-home/notifications/
    # Dedicated Gradle build cache for project artifacts, in oder to reduce individual cache size.
    - &gradle_build_cache
      key: gradle-build-$CI_COMMIT_REF_SLUG
      fallback_keys:
        - gradle-build-$CI_DEFAULT_BRANCH
      paths:
        # Save build artifacts to cache; follows official Gradle.gitlab-ci.yml template
        - "**/build/"
    # Cache Antora related files
    - &antora_cache
      key: antora-$CI_COMMIT_REF_SLUG
      fallback_keys:
        - antora-$CI_DEFAULT_BRANCH
      paths:
        - .antora-cache
        - "**/node_modules/"

.gradle_build_job:
  before_script:
    # Tell Gradle to write its files to a separate directory within the build directory, so files do not conflict.
    - export GRADLE_USER_HOME=`pwd`/.gradle-user-home
    # Remove files that might be problematic (recommended by Travis CI)
    - rm -f  ${GRADLE_USER_HOME}/caches/modules-2/modules-2.lock
    # Tell Antora to write its files to a separate directory within the build directory, so files do not conflict.
    - export ANTORA_CACHE_DIR=`pwd`/.antora-cache
  tags:
    - saas-linux-medium-amd64

build:
  stage: build
  extends: .gradle_build_job
  services:
    - docker:dind
  needs: []
  script:
    - ./gradlew --build-cache clean spotlessCheck buildHealth build antora openapi3
  after_script:
    - find . -wholename '*/build/reports/dependency-analysis/*' -prune ! -name 'build-health-report.txt' -print0 | xargs -0 rm -r
  coverage: '/^Coverage:\s(\d+\.\d+%)/'
  artifacts:
    name: build
    when: always
    paths:
      - '**/build/reports/tests'
      - '**/build/reports/dependency-analysis/build-health-report.txt'
      - rest-api-server/build/libs/rest-api-server-*.jar
      - documentation/build/site/
      - documentation/build/api-spec/openapi3.yaml
    reports:
      junit: rest-api-server/build/test-results/**/TEST-*.xml
  rules:
    - when: always

generate_api_clients:
  stage: package
  extends: .gradle_build_job
  cache:
    - <<: *gradle_cache
      policy: pull
    - <<: *gradle_build_cache
      policy: pull
    - <<: *gradle_wrapper_cache
      policy: pull
    - <<: *antora_cache
      policy: pull
  needs:
    - job: build
      artifacts: false
  allow_failure: true
  script:
    - ./gradlew --build-cache generateOpenApiClient
  artifacts:
    name: api-clients
    expose_as: api-clients
    expire_in: 1 mos
    paths:
      - api-clients/python-client/build/python-client
      - api-clients/typescript-client/build/typescript-client
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG
      when: always
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH
      when: manual

# Deploy documentation to GitLab Pages.
pages:
  stage: deploy
  resource_group: gitlab-pages
  cache: []
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p public
    - cp -r documentation/build/site/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_TAG

# Template for building Docker images.
.docker_build_instructions:
  stage: package
  extends: .gradle_build_job
  cache:
    - <<: *gradle_cache
      policy: pull
    - <<: *gradle_build_cache
      policy: pull
    - <<: *gradle_wrapper_cache
      policy: pull
    - <<: *antora_cache
      policy: pull
  needs:
    - job: build
      artifacts: true
  script:
    # Turn a list of whitespace-separated tags into a comma-separated list, as GitLab gets confused with commas and variable substitutions.
    - docker_tags=$(echo "$IMAGE_TAGS" | sed 's/ \+/,/g')
    # Build using Jib (pushed automatically)
    - ./gradlew --build-cache jib -Djib.to.image=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -Djib.to.tags=$docker_tags -Djib.to.auth.username=$REGISTRY_USER -Djib.to.auth.password=$REGISTRY_PASSWORD

docker_build_master:
  extends: .docker_build_instructions
  variables:
    IMAGE_TAGS: latest master
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

docker_build:
  extends: .docker_build_instructions
  variables:
    IMAGE_TAGS: $CI_COMMIT_REF_NAME release
  artifacts:
    name: docker_build
    when: on_failure
    paths:
      - '**/build/reports/tests'
      - '**/build/reports/dependency-analysis/build-health-report.txt'
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH

resolve_dependencies:
  extends: .gradle_build_job
  stage: build
  cache:
    - <<: *gradle_cache
      policy: pull
    - <<: *gradle_wrapper_cache
      policy: pull
  needs: []
  script:
    - ./gradlew :rest-api-server:dependencies > gradle.graph.txt
  artifacts:
    name: dependencies
    expire_in: 1 mos
    paths:
      - gradle.graph.txt

dependency_scanning:
  cache: []
  needs:
    - job: resolve_dependencies
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

container_scanning:
  cache: []

secret_detection:
  cache: []
  needs: []
  rules:
    - when: always

publish_typescript_client:
  stage: deploy
  image: node:latest
  cache: []
  allow_failure: true
  variables:
    GIT_STRATEGY: none
  needs:
    - job: generate_api_clients
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - cd ./api-clients/typescript-client/build/typescript-client
    - echo "@orkg:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm install
    - npm publish

publish_python_client:
  stage: deploy
  image: python:latest
  cache: []
  allow_failure: true
  variables:
    GIT_STRATEGY: none
    TWINE_USERNAME: gitlab-ci-token
    TWINE_PASSWORD: $CI_JOB_TOKEN
  needs:
    - job: generate_api_clients
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - pip install build twine
    - cd ./api-clients/python-client/build/python-client
    - python -m build
    - python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
