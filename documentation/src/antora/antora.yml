name: orkg-backend
version: true
title: REST API
nav:
  - modules/ROOT/nav.adoc
ext:
  collector:
    - scan:
        dir: documentation/build/aggregated-antora-content
    # Dummy configuration for the IntelliJ AsciiDoc Plugin
    - scan:
        dir: ../../build/generated-snippets
        base: modules/ROOT/examples
asciidoc:
  attributes:
    orkg: 'Open Research Knowledge Graph'
    orkg_full: '{orkg} (ORKG)'
    gitlab_base: 'https://gitlab.com'
    gitlab_group: 'TIBHannover/orkg'
    repo_name: 'orkg-backend'
    project_url: '{gitlab_base}/{gitlab_group}/{repo_name}'
    issues_url: '{project_url}/-/issues'
